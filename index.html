<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>除息計算機 Pro | @youzi_be_rich</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      -webkit-font-smoothing: antialiased;
      background-color: #F9F6F0;
    }
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const CalculatorIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
    );

    const InfoIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    );

    const InstagramIcon = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
    );

    function App() {
      const [shareCount, setShareCount] = useState('');
      const [dividendPerShare, setDividendPerShare] = useState('');
      const [ratio54C, setRatio54C] = useState(''); 

      const shareCountNum = parseFloat(shareCount) || 0;
      const dividendNum = parseFloat(dividendPerShare) || 0;
      
      // 如果欄位是空的，預設當作 100% (即 1)，否則就照輸入的數字除以 100
      const ratioNum = ratio54C === '' ? 1 : (parseFloat(ratio54C) || 0) / 100;
      
      const totalDividend = Math.floor(shareCountNum * dividendNum);
      const amount54C = Math.floor(totalDividend * ratioNum);
      
      const nhiRate = 0.0211;
      const nhiFee = amount54C >= 20000 ? Math.round(amount54C * nhiRate) : 0;
      
      const netDividend = totalDividend - nhiFee;

      return (
        <div className="min-h-screen flex flex-col items-center justify-between font-sans selection:bg-[#4A3728] selection:text-[#F9F6F0]" style={{ backgroundColor: '#F9F6F0', color: '#4A3728' }}>
          
          <div className="w-full h-8"></div>

          <main className="w-full max-w-md px-6 py-8 flex-1 flex flex-col justify-center">
            <div className="bg-white/60 backdrop-blur-md rounded-2xl shadow-sm border border-[#4A3728]/10 p-8">
              
              <div className="flex items-center justify-center gap-3 mb-8">
                <CalculatorIcon size={24} className="text-[#4A3728]" />
                <h1 className="text-2xl font-bold tracking-widest text-center">除息計算機 <span className="text-sm font-normal opacity-60">Professional</span></h1>
              </div>

              <div className="space-y-5">
                <div className="space-y-1">
                  <label className="block text-xs tracking-widest font-medium opacity-60 uppercase">1. 持有股數 (股)</label>
                  <input
                    type="number"
                    value={shareCount}
                    onChange={(e) => setShareCount(e.target.value)}
                    placeholder="1000"
                    className="w-full bg-transparent border-b border-[#4A3728]/20 py-2 text-xl focus:outline-none focus:border-[#4A3728] transition-colors placeholder:text-[#4A3728]/30"
                  />
                </div>

                <div className="space-y-1">
                  <label className="block text-xs tracking-widest font-medium opacity-60 uppercase">2. 每股除息金額 (元/股)</label>
                  <input
                    type="number"
                    step="0.01"
                    value={dividendPerShare}
                    onChange={(e) => setDividendPerShare(e.target.value)}
                    placeholder="2.5"
                    className="w-full bg-transparent border-b border-[#4A3728]/20 py-2 text-xl focus:outline-none focus:border-[#4A3728] transition-colors placeholder:text-[#4A3728]/30"
                  />
                </div>

                <div className="space-y-1">
                  <div className="flex justify-between items-center">
                    <label className="block text-xs tracking-widest font-medium opacity-60 uppercase">3. 54C 股利占比 (%)</label>
                    <span className="text-[10px] bg-[#4A3728]/5 px-2 py-0.5 rounded text-[#4A3728]/60">個股選 100%</span>
                  </div>
                  <input
                    type="number"
                    value={ratio54C}
                    onChange={(e) => setRatio54C(e.target.value)}
                    placeholder="100"
                    className="w-full bg-transparent border-b border-[#4A3728]/20 py-2 text-xl focus:outline-none focus:border-[#4A3728] transition-colors placeholder:text-[#4A3728]/30"
                  />
                </div>
              </div>

              <div className="my-8 border-b border-dashed border-[#4A3728]/20"></div>

              <div className="space-y-4 bg-[#F9F6F0]/50 p-6 rounded-xl border border-[#4A3728]/5 text-sm">
                <div className="flex justify-between items-center opacity-80">
                  <span>總共除息金額</span>
                  <span className="font-semibold">NT$ {totalDividend.toLocaleString()}</span>
                </div>
                
                <div className="flex justify-between items-center opacity-60 italic text-xs">
                  <span>(其中 54C 應計金額)</span>
                  <span>NT$ {amount54C.toLocaleString()}</span>
                </div>

                <div className="flex justify-between items-center">
                  <div className="flex items-center gap-1">
                    <span>二代健保費用</span>
                    <div className="group relative cursor-help">
                      <InfoIcon size={14} className="opacity-40" />
                      <div className="absolute left-0 bottom-full mb-2 w-56 p-3 bg-[#4A3728] text-[#F9F6F0] text-[11px] rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none leading-relaxed z-10">
                        僅針對「54C股利所得」計算。單筆達 2 萬元(含)以上扣取 2.11%。
                      </div>
                    </div>
                  </div>
                  <span className={`font-semibold ${nhiFee > 0 ? 'text-red-700/80' : ''}`}>
                    - NT$ {nhiFee.toLocaleString()}
                  </span>
                </div>

                <div className="pt-4 border-t border-[#4A3728]/10 flex justify-between items-end">
                  <span className="text-base font-medium">實際入帳金額</span>
                  <span className="text-2xl font-bold tracking-tighter">
                    NT$ {netDividend.toLocaleString()}
                  </span>
                </div>
              </div>

            </div>
          </main>

          <footer className="w-full bg-white py-8 flex flex-col items-center justify-center border-t border-[#4A3728]/5">
            <a 
              href="https://www.instagram.com/youzi_be_rich/" 
              target="_blank" 
              className="flex items-center gap-2 mb-2 hover:opacity-70 transition-opacity"
              style={{ color: '#4A3728', textDecoration: 'none' }}
            >
              <InstagramIcon size={18} />
              <span className="font-medium tracking-widest text-sm">youzi_be_rich</span>
            </a>
            <p className="text-xs tracking-[0.2em] font-light mt-1 opacity-80 m-0">
              投資不難｜堅持而已
            </p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
