<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>除息計算機 | @youzi_be_rich</title>
  
  <!-- 載入 Tailwind CSS (用來呈現文青排版與樣式) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 以便在瀏覽器中直接解析 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 確保字體平滑與基礎設定 */
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #F9F6F0;
    }
    /* 隱藏 input number 的上下箭頭以保持版面乾淨 */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>
  <!-- React App 將會渲染在這裡 -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 自定義圖示組件 (取代原本需要安裝的 lucide-react)
    const CalculatorIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>
    );

    const InfoIcon = ({ size, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    );

    const InstagramIcon = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
    );

    // 主要的計算機應用程式
    function App() {
      // 狀態管理：改為股數 (Shares Count)
      const [shareCount, setShareCount] = useState('');
      const [dividendPerShare, setDividendPerShare] = useState('');

      // 數值計算
      const shareCountNum = parseFloat(shareCount) || 0;
      const dividendNum = parseFloat(dividendPerShare) || 0;
      
      // 總除息金額 = 股數 * 每股配息
      const totalDividend = Math.floor(shareCountNum * dividendNum);
      
      // 台灣二代健保補充保費：單筆達 20,000 元(含)以上，費率 2.11%
      const nhiRate = 0.0211;
      const nhiFee = totalDividend >= 20000 ? Math.round(totalDividend * nhiRate) : 0;
      
      // 實際入帳金額
      const netDividend = totalDividend - nhiFee;

      return (
        <div className="min-h-screen flex flex-col items-center justify-between font-sans selection:bg-[#4A3728] selection:text-[#F9F6F0]" style={{ backgroundColor: '#F9F6F0', color: '#4A3728' }}>
          
          {/* 頂部裝飾留白 */}
          <div className="w-full h-8"></div>

          {/* 主要計算機卡片 */}
          <main className="w-full max-w-md px-6 py-8 flex-1 flex flex-col justify-center">
            <div className="bg-white/60 backdrop-blur-md rounded-2xl shadow-sm border border-[#4A3728]/10 p-8">
              
              <div className="flex items-center justify-center gap-3 mb-8">
                <CalculatorIcon size={24} className="text-[#4A3728]" />
                <h1 className="text-2xl font-bold tracking-widest text-center" style={{ fontFamily: 'sans-serif' }}>
                  除息計算機
                </h1>
              </div>

              {/* 輸入區 */}
              <div className="space-y-6">
                <div className="space-y-2">
                  <label className="block text-sm tracking-widest font-medium opacity-80">
                    1. 持有股數 (股)
                  </label>
                  <div className="relative">
                    <input
                      type="number"
                      min="0"
                      value={shareCount}
                      onChange={(e) => setShareCount(e.target.value)}
                      placeholder="請輸入股數 (如: 1000)"
                      className="w-full bg-transparent border-b-2 border-[#4A3728]/20 py-2 px-1 text-xl focus:outline-none focus:border-[#4A3728] transition-colors placeholder:text-[#4A3728]/30"
                    />
                  </div>
                </div>

                <div className="space-y-2">
                  <label className="block text-sm tracking-widest font-medium opacity-80">
                    2. 每股除息金額 (元/股)
                  </label>
                  <input
                    type="number"
                    min="0"
                    step="0.01"
                    value={dividendPerShare}
                    onChange={(e) => setDividendPerShare(e.target.value)}
                    placeholder="請輸入配息 (如: 2.5)"
                    className="w-full bg-transparent border-b-2 border-[#4A3728]/20 py-2 px-1 text-xl focus:outline-none focus:border-[#4A3728] transition-colors placeholder:text-[#4A3728]/30"
                  />
                </div>
              </div>

              <div className="my-8 border-b border-dashed border-[#4A3728]/20"></div>

              {/* 輸出區 */}
              <div className="space-y-5 bg-[#F9F6F0]/50 p-6 rounded-xl border border-[#4A3728]/5">
                <div className="flex justify-between items-end">
                  <span className="text-sm tracking-wider opacity-80">總共除息金額</span>
                  <span className="text-lg font-semibold">
                    NT$ {totalDividend.toLocaleString()}
                  </span>
                </div>
                
                <div className="flex justify-between items-end">
                  <div className="flex items-center gap-1">
                    <span className="text-sm tracking-wider opacity-80">二代健保費用</span>
                    <div className="group relative cursor-help">
                      <InfoIcon size={14} className="opacity-50" />
                      <div className="absolute left-0 bottom-full mb-2 w-48 p-2 bg-[#4A3728] text-[#F9F6F0] text-xs rounded shadow-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                        單筆股利達 2 萬元(含)以上，需扣取 2.11% 補充保費。
                      </div>
                    </div>
                  </div>
                  <span className="text-lg font-semibold text-red-700/80">
                    - NT$ {nhiFee.toLocaleString()}
                  </span>
                </div>

                <div className="pt-4 border-t border-[#4A3728]/10 flex justify-between items-end">
                  <span className="text-base tracking-wider font-medium">實際領取金額</span>
                  <span className="text-2xl font-bold tracking-wider">
                    NT$ {netDividend.toLocaleString()}
                  </span>
                </div>
              </div>

            </div>
          </main>

          {/* 底部品牌區塊 */}
          <footer className="w-full bg-white py-8 flex flex-col items-center justify-center border-t border-[#4A3728]/5 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
            <a 
              href="https://www.instagram.com/youzi_be_rich/" 
              target="_blank" 
              rel="noopener noreferrer"
              className="flex items-center gap-2 mb-2 hover:opacity-70 transition-opacity"
              style={{ color: '#4A3728', textDecoration: 'none' }}
            >
              <InstagramIcon size={20} />
              <span className="font-medium tracking-widest text-sm">youzi_be_rich</span>
            </a>
            <p className="text-sm tracking-[0.2em] font-light mt-1 m-0" style={{ color: '#4A3728' }}>
              投資不難｜堅持而已
            </p>
          </footer>

        </div>
      );
    }

    // 將 App 渲染到畫面上的 root 節點
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
